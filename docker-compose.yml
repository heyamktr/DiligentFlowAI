services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/backend/data/authorized_to_act.db}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - backend-data:/app/backend/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  backend-data:
